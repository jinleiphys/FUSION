physh_version: 2.8.0
discipline: Nuclear Physics
discipline_physh_id: 0213a5a0-0742-43f3-804b-3ccea08a13c0
total_concepts: 180
matching_tiers:
  1: phrase hits title
  2: phrase hits abstract
  3: fulltext only; requires >= 2 distinct match phrases OR one phrase hitting >= 3 times
negative_filter:
  rule: papers with primary_cat starting with hep- or astro-ph can only receive reaction-family concepts at tier 1 or 2, never on a tier-3 fulltext match
  reaction_family_slugs:
  - nuclear-reactions
  - direct-reactions
  - breakup-reactions
  - knockout-reactions
  - fusion-reactions
  - nuclear-fusion
  - transfer-reactions
  - coulomb-excitation
  - optical-model
  - few-body-systems
  - relativistic-heavy-ion-collisions
  - heavy-ion-nuclear-reactions
dangerous_fulltext_words:
- binding
- cross-section
- density
- energy
- excitation
- isospin
- lifetime
- mass
- model
- momentum
- parity
- shell
- spin
- strength
- symmetry
- width
